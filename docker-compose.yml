version: '3.8'

services:
  # 统一服务：前端 + 后端合并到一个容器
  skillhub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skills-hub
    restart: unless-stopped
    env_file:
      - .env.local
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: skills-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: skillhub
      POSTGRES_PASSWORD: skillhub123
      POSTGRES_DB: skillhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillhub -d skillhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: skills-hub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
