name: skills-hub-team
description: Skills Intelligence Hub 开发团队

# 任务类型 → 角色映射规则
task_rules:
  - keywords: [实现, 开发, 添加, 新建]
    type: feature
    workflow: [architect, "parallel: [backend, frontend]", developer, tester]

  - keywords: [审查, review, 检查]
    type: review
    workflow: [architect]

  - keywords: [测试, test, 验证]
    type: test
    workflow: [tester]

  - keywords: [修复, fix, bug]
    type: bugfix
    workflow: [backend, developer, tester]

  - keywords: [设计, 架构, 方案]
    type: design
    workflow: [architect]

  - keywords: [部署, deploy, 云端, 环境]
    type: deploy
    workflow: [developer]

  - keywords: [云端测试, cloud-test]
    type: cloud-test
    workflow: [developer, tester]

# 成员定义
members:
  - id: architect
    name: 架构师
    skill: .claude/skills/team/architect.md

  - id: backend
    name: 后端开发
    skill: .claude/skills/team/backend.md

  - id: frontend
    name: 前端开发
    skill: .claude/skills/team/frontend.md

  - id: developer
    name: 部署专员
    skill: .claude/skills/team/developer.md

  - id: tester
    name: 测试工程师
    skill: .claude/skills/team/tester.md