# Skills Hub 生产环境部署配置
# 包含完整服务栈：skillhub + postgres + redis + rustfs
# 环境变量通过 .env 文件加载
# 使用方式: ./install.sh && docker compose up -d

services:
  skillhub:
    image: swr.cn-north-4.myhuaweicloud.com/skillhub/skillhub:latest
    container_name: skills-hub
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 服务配置
      - SERVER_HOST=0.0.0.0
      - RUN_MODE=prod
      - RUST_LOG=info
      # 数据库配置
      - DATABASE_URL=postgres://skillhub:${POSTGRES_PASSWORD}@postgres:5432/skillhub
      # Redis 配置
      - REDIS_URL=redis://redis:6379
      # JWT 配置
      - JWT_EXPIRATION=86400
      # 存储配置
      - STORAGE_ENDPOINT=http://rustfs:9000
      - STORAGE_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${MINIO_SECRET_KEY}
      - STORAGE_BUCKET=skillhub
      # CORS 配置 (生产模式使用 CORS_ORIGINS 白名单)
      - CORS_ORIGINS=${CORS_ORIGINS}
      # 其他配置
      - MAX_UPLOAD_SIZE=100
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rustfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  postgres:
    image: postgres:15-alpine
    container_name: skills-hub-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=skillhub
      - POSTGRES_DB=skillhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillhub -d skillhub"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: skills-hub-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  rustfs:
    image: rustfs/rustfs:latest
    container_name: skills-hub-rustfs
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RUSTFS_DATA_DIR=/data
      - RUSTFS_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${MINIO_SECRET_KEY}
    volumes:
      - rustfs_data:/data
    ports:
      - "${RUSTFS_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  postgres_data:
  redis_data:
  rustfs_data: